name: OneClickDocs-Install

run-name: Install Docs on pure environment

on:
  workflow_dispatch:
    inputs:
      box-version:
         type: string
         description: 'Docs version that will be installed inside box'
         required: true
         
jobs:
  get-version:
    name: "Get ds version for test"
    runs-on: ubuntu-latest
    steps:
    - name: get-version
      id: get-version
      shell: bash
      run: |
          echo 1

  vagrant-up:
    name: "Rebbuild Docs ${{matrix.name}}"
    runs-on: ubuntu-latest
    env:
      HCP_CLIENT_ID: ${{ secrets.HCP_CLIENT_ID }}
      HCP_CLIENT_SECRET: ${{ secrets.HCP_CLIENT_SECRET }}
      BOX_VERSION: ${{ github.event.inputs.box-version }}
      VAGRANT_ORG: danilapog
      PRODUCT: docs
      OS_NAME: ${{ matrix.name }}
      OS: ${{ matrix.os }}
      DISTR: ${{ matrix.distr }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - distr: unclebob
            os: centos7
            name: "centos7"

          - distr: unclebob
            os: centos8s
            name: "centos8s"
            
          - distr: unclebob
            os: centos9s
            name: "centos9s"

          - distr: unclebob
            os: debian10
            name: "debian10"

          - distr: unclebob
            os: debian11
            name: "debian11" 
            
          - distr: unclebob
            os: debian12
            name: "debian12"         

          - distr: unclebob
            os: ubuntu1804
            name: "ubuntu1804"               

          - distr: unclebob
            os: ubuntu2004
            name: "ubuntu2004"

          - distr: unclebob
            os: ubuntu2204
            name: "ubuntu2204"

          - distr: unclebob
            os: ubuntu2404
            name: "ubuntu2404"

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python 3.
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Set up vagrant and virtualbox
      run: |
           curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
           echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com jammy main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
           sudo apt update -y 
           sudo apt install vagrant virtualbox -y

    - name: Test production scripts
      uses: nick-fields/retry@v2
      with:
        max_attempts: 2
        timeout_minutes: 40
        retry_on: error
        command: |
                set -eux
                
                cd tests/vagrant
                   TEST_CASE='--production-install' \
                   DISTR='${{ matrix.distr }}' \
                   OS='${{ matrix.os }}' \
                   DOWNLOAD_SCRIPT='-ds true' \
                   RAM='6000' \
                   CPU='3' \
                   ARGUMENTS="-arg '--skiphardwarecheck true --makeswap false'" \
                   vagrant up
                   sleep 100
                   vagrant package --output ${PRODUCT}-${OS_NAME}.box
                   bash ./publish.sh
        on_retry_command: |
              echo "RUN CLEAN UP: Destroy vagrant and one more try"
              cd tests/vagrant
              sleep 10
              vagrant destroy --force
